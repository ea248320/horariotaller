name: Deploy Frontend a GitHub Pages

on:
  push:
    branches: [main, master, claude/proyecto-basado-referencia-23w5fz]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Instalar dependencias
        run: pnpm install --no-frozen-lockfile

      - name: Verificación de tipos (bloquea el despliegue si falla)
        run: pnpm --filter @workspace/horario-secretarias run typecheck

      - name: Build del frontend
        run: pnpm --filter @workspace/horario-secretarias run build
        env:
          NODE_ENV: production

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Subir archivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/horario-secretarias/dist

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
